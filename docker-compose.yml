services:
  jupyterhub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    container_name: jupyterhub
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - jupyterhub_data:/srv/jupyterhub/data
      - type: bind
        source: /jupyterhub/data
        target: /jupyterhub/data
        bind:
          propagation: shared
    environment:
      - DOCKER_NETWORK_NAME=jupyterhub_network
    networks:
      - jupyterhub_network
    deploy:
      resources:
        # TODO: adjust the resources usage of compose
        limits:
          cpus: '3.6'  # Xcores * %usage 
          memory: 16G
        reservations:
          cpus: '0.5'
          memory: 2G

volumes:
  jupyterhub_data:
    # Named volume for JupyterHub's internal data (DB, state, etc.)
    # This is separate from /jupyterhub/data which holds user notebook files

networks:
  jupyterhub_network:
    name: jupyterhub_network
    driver: bridge
